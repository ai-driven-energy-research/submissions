name: Publish Accepted Paper

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  publish:
    if: github.event.label.name == 'accepted'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Extract submission details from issue
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // Extract repo URL
            const repoMatch = body.match(/https:\/\/github\.com\/([\w.-]+)\/([\w.-]+)/);
            if (!repoMatch) {
              core.setFailed('No GitHub repository URL found in issue body.');
              return;
            }
            const repoOwner = repoMatch[1];
            const repoName = repoMatch[2];
            core.setOutput('repo_owner', repoOwner);
            core.setOutput('repo_name', repoName);
            core.setOutput('repo_full', `${repoOwner}/${repoName}`);

            // Extract paper title
            const titleMatch = body.match(/### Paper Title\s*\n\s*(.+)/);
            const paperTitle = titleMatch ? titleMatch[1].trim() : issue.title.replace(/\[.*?\]\s*/, '');
            core.setOutput('paper_title', paperTitle);

            // Extract first author name and affiliation
            const authorsMatch = body.match(/### Authors\s*\n([\s\S]*?)(?=\n###)/);
            let firstAuthor = 'See repository';
            let firstAffiliation = '';
            if (authorsMatch) {
              const authorLines = authorsMatch[1].trim().split('\n').filter(l => l.trim());
              const first = authorLines[0].replace(/^\d+\.\s*/, '').trim();
              const parts = first.split(/\s*-\s*/);
              firstAuthor = (parts[0] || '').trim();
              firstAffiliation = (parts[1] || '').trim();
            }
            core.setOutput('first_author', firstAuthor);
            core.setOutput('first_affiliation', firstAffiliation);
            core.setOutput('issue_number', issue.number.toString());

            console.log(`Paper: ${paperTitle}`);
            console.log(`Author: ${firstAuthor} — ${firstAffiliation}`);
            console.log(`Repo: ${repoOwner}/${repoName}`);

      - name: Determine volume and issue number
        id: volume
        uses: actions/github-script@v7
        with:
          script: |
            // Count previously accepted+closed papers for sequential numbering
            const { data: closed } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'accepted',
              state: 'closed',
              per_page: 100,
            });

            const year = new Date().getFullYear();
            const paperNumber = closed.length + 1;
            const volumeLabel = `Vol. 1, No. ${paperNumber}, ${year}`;
            core.setOutput('year', year.toString());
            core.setOutput('paper_number', paperNumber.toString());
            core.setOutput('volume_label', volumeLabel);
            console.log(`Assigned: ${volumeLabel}`);

      - name: Fork repo into org
        id: fork
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            const org = 'ai-driven-energy-research';
            const owner = '${{ steps.extract.outputs.repo_owner }}';
            const repo = '${{ steps.extract.outputs.repo_name }}';

            // Check if fork already exists
            try {
              const existing = await github.rest.repos.get({ owner: org, repo: repo });
              console.log(`Fork ${org}/${repo} already exists, skipping.`);
              core.setOutput('fork_url', existing.data.html_url);
              return;
            } catch (e) {
              // 404 = doesn't exist yet
            }

            const result = await github.rest.repos.createFork({
              owner: owner,
              repo: repo,
              organization: org,
            });

            console.log(`Forked to: ${result.data.html_url}`);
            core.setOutput('fork_url', result.data.html_url);

            // Wait for fork to be ready
            await new Promise(r => setTimeout(r, 15000));

      - name: Create release to trigger Zenodo DOI
        id: release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            const org = 'ai-driven-energy-research';
            const repo = '${{ steps.extract.outputs.repo_name }}';
            const title = '${{ steps.extract.outputs.paper_title }}';
            const issueNum = '${{ steps.extract.outputs.issue_number }}';
            const volumeLabel = '${{ steps.volume.outputs.volume_label }}';

            // Check if release already exists
            try {
              const releases = await github.rest.repos.listReleases({
                owner: org, repo: repo, per_page: 1
              });
              if (releases.data.length > 0) {
                console.log('Release already exists, skipping.');
                core.setOutput('release_url', releases.data[0].html_url);
                return;
              }
            } catch (e) {
              // no releases yet
            }

            const repoData = await github.rest.repos.get({ owner: org, repo: repo });
            const defaultBranch = repoData.data.default_branch;

            const release = await github.rest.repos.createRelease({
              owner: org,
              repo: repo,
              tag_name: 'v1.0.0',
              name: `AIDER ${volumeLabel} — ${title}`,
              body: [
                `## ${title}`,
                '',
                `**${volumeLabel}**`,
                '',
                `Published in AI-Driven Energy Research (AIDER).`,
                '',
                `**Submission & review:** https://github.com/ai-driven-energy-research/submissions/issues/${issueNum}`,
                `**Journal website:** https://ai-driven-energy-research.github.io`,
              ].join('\n'),
              target_commitish: defaultBranch,
            });

            console.log(`Release created: ${release.data.html_url}`);
            core.setOutput('release_url', release.data.html_url);

      - name: Poll Zenodo for DOI
        id: zenodo
        run: |
          echo "Waiting for Zenodo to mint DOI..."
          REPO_NAME="${{ steps.extract.outputs.repo_name }}"
          DOI=""

          # Poll every 30s for up to 5 minutes
          for i in $(seq 1 10); do
            echo "Attempt $i/10..."
            RESULT=$(curl -s "https://zenodo.org/api/records?q=${REPO_NAME}&sort=mostrecent&size=5")
            DOI=$(echo "$RESULT" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for h in data.get('hits', {}).get('hits', []):
              title = h.get('metadata', {}).get('title', '').lower()
              if 'ai-driven-energy-research' in title or '${REPO_NAME}'.lower() in title:
                  print(h.get('doi', ''))
                  break
          " 2>/dev/null)

            if [ -n "$DOI" ]; then
              echo "DOI found: $DOI"
              echo "doi=$DOI" >> "$GITHUB_OUTPUT"
              echo "doi_url=https://doi.org/$DOI" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            sleep 30
          done

          echo "DOI not yet available after 5 minutes."
          echo "doi=" >> "$GITHUB_OUTPUT"
          echo "doi_url=" >> "$GITHUB_OUTPUT"

      - name: Update journal website
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            const org = 'ai-driven-energy-research';
            const websiteRepo = 'ai-driven-energy-research.github.io';
            const repo = '${{ steps.extract.outputs.repo_name }}';
            const title = '${{ steps.extract.outputs.paper_title }}';
            const firstAuthor = '${{ steps.extract.outputs.first_author }}';
            const firstAffiliation = '${{ steps.extract.outputs.first_affiliation }}';
            const forkUrl = '${{ steps.fork.outputs.fork_url }}';
            const volumeLabel = '${{ steps.volume.outputs.volume_label }}';
            const doi = '${{ steps.zenodo.outputs.doi }}';
            const doiUrl = '${{ steps.zenodo.outputs.doi_url }}';
            const issueNum = '${{ steps.extract.outputs.issue_number }}';

            // Read current index.html
            const file = await github.rest.repos.getContent({
              owner: org, repo: websiteRepo,
              path: 'index.html',
            });

            let content = Buffer.from(file.data.content, 'base64').toString('utf8');

            // Skip if paper already listed
            if (content.includes(title)) {
              console.log('Paper already listed on website, skipping.');
              return;
            }

            // Build author display
            const authorDisplay = firstAffiliation
              ? `${firstAuthor} &mdash; ${firstAffiliation}`
              : firstAuthor;

            // Build links row
            const links = [
              `<a href="${forkUrl}">Repository</a>`,
              `<a href="${forkUrl}/tree/main/paper">Manuscript</a>`,
              `<a href="${forkUrl}/tree/main/process-log">Process Log</a>`,
              `<a href="https://github.com/ai-driven-energy-research/submissions/issues/${issueNum}">Review</a>`,
            ];
            if (doi) {
              links.push(`<a href="${doiUrl}">DOI: ${doi}</a>`);
            }

            const paperEntry = [
              '        <div class="board-member" style="margin-top:12px;">',
              `            <div class="board-role">${volumeLabel}</div>`,
              `            <div class="name">${title}</div>`,
              `            <div class="affiliation">${authorDisplay}</div>`,
              '            <div style="margin-top:8px; font-family:\'Inter\',sans-serif; font-size:0.82em;">',
              `                ${links.join(' &middot; ')}`,
              '            </div>',
              '        </div>',
            ].join('\n');

            // Replace empty placeholder or append after existing papers
            if (content.includes('papers-empty')) {
              content = content.replace(
                /<div class="papers-empty">[\s\S]*?<\/div>/,
                paperEntry
              );
            } else {
              // Append before the closing tags of the papers container
              const marker = '<!-- end-papers -->';
              if (content.includes(marker)) {
                content = content.replace(marker, paperEntry + '\n' + marker);
              } else {
                // Fallback: insert after the section-lead paragraph
                content = content.replace(
                  /(<p class="section-lead">Each paper is a GitHub repository[\s\S]*?<\/p>)/,
                  `$1\n${paperEntry}`
                );
              }
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner: org,
              repo: websiteRepo,
              path: 'index.html',
              message: `Publish: ${title} (${volumeLabel})`,
              content: Buffer.from(content).toString('base64'),
              sha: file.data.sha,
            });

            console.log('Website updated.');

      - name: Post publication comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            const forkUrl = '${{ steps.fork.outputs.fork_url }}';
            const releaseUrl = '${{ steps.release.outputs.release_url }}';
            const title = '${{ steps.extract.outputs.paper_title }}';
            const volumeLabel = '${{ steps.volume.outputs.volume_label }}';
            const doi = '${{ steps.zenodo.outputs.doi }}';
            const doiUrl = '${{ steps.zenodo.outputs.doi_url }}';

            const doiRow = doi
              ? `| Zenodo DOI | [${doi}](${doiUrl}) |`
              : `| Zenodo DOI | Pending — Zenodo will process the release shortly |`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## Paper Published',
                '',
                `**${title}**`,
                `**${volumeLabel}**`,
                '',
                '| Item | Link |',
                '|---|---|',
                `| Official repository | ${forkUrl} |`,
                `| Release | ${releaseUrl || 'Pending'} |`,
                doiRow,
                `| Journal website | https://ai-driven-energy-research.github.io/#papers |`,
                '',
                'The paper has been forked into the AIDER organisation, a GitHub release created (triggering Zenodo DOI), and the journal website updated.',
                '',
                'Congratulations to the authors!',
                '',
                '---',
                '*Automated by the AIDER publication pipeline.*',
              ].join('\n')
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });

            console.log('Issue closed.');
